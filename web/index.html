  <style>
    /* First-paint loader shown before the Flutter engine boots. */
    body { margin: 0; background-color: #0B0F19; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #0B0F19; z-index: 9999;
      transition: opacity .4s ease;
    }
    .spinner {
      width: 46px; height: 46px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: #6C8CFF; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="loading"><div class="spinner"></div></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading');
      if (loader) { loader.style.opacity = '0'; setTimeout(function(){ loader.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
